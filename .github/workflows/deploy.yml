name: Build & validate dashboard data

# Cloudflare deploys the site on every push to main via its native Git integration
# (report/dashboard/wrangler.jsonc; gated by report/dashboard/_worker.js + the SITE_PASSWORD secret).
# This workflow just rebuilds data.js from the committed processed CSVs and runs the integrity
# checks, so a push that breaks the data fails CI. It does not deploy (Cloudflare does that).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Rebuild dashboard data + validate integrity
        run: |
          pip install pandas
          # Regenerate every dashboard data file that builds from committed inputs only (no network):
          # the main board (85), the US localisation/sub-awards/projmeta (91), the treemap drill-down
          # (97), the MOF DFIMS ledger (99), and the search indexes (93). 86/87/96/98 need live
          # APIs, so they stay manual.
          python scripts/85_dashboard_data.py
          python scripts/91_us_localization.py
          python scripts/97_us_sector_activities.py
          python scripts/99_dfims_dashboard_data.py
          python scripts/93_search_index.py
          python scripts/90_validate.py
          # The committed dashboard JS (≈0.6 MB the public actually loads) must equal a fresh rebuild.
          # This fails the build on a hand-edit or a stale-data commit that bypassed the pipeline.
          git diff --exit-code -- \
            report/dashboard/data.js \
            report/dashboard/search_index.js report/dashboard/search_index_us.js \
            report/dashboard/usforeignaiddata/us_subawards.js \
            report/dashboard/usforeignaiddata/us_detail.js \
            report/dashboard/usforeignaiddata/us_projmeta.js \
            report/dashboard/usforeignaiddata/us_sector_acts.js \
            report/dashboard/dfims_projects.js \
            || { echo "::error::Committed dashboard JS is stale — run 'make dashboard-data' and commit."; exit 1; }
